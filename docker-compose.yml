version: '3.8'

services:
  # Main InfiDao application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infidao-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/data/lancedb
      - BGE_MODEL_PATH=/app/models/bge-m3
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=info
      - ENABLE_METRICS=true
      - KV_CACHE=true
    volumes:
      - infidao_data:/app/data
      - infidao_models:/app/models
      - infidao_logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - infidao-network

  # Redis cache service
  redis:
    image: redis:7-alpine
    container_name: infidao-redis
    ports:
      - "6379:6379"
    volumes:
      - infidao_redis:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - infidao-network

  # Optional: PostgreSQL for metadata storage
  postgres:
    image: postgres:15-alpine
    container_name: infidao-postgres
    environment:
      - POSTGRES_DB=infidao
      - POSTGRES_USER=infidao
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-infidao123}
    ports:
      - "5432:5432"
    volumes:
      - infidao_postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - infidao-network
    profiles:
      - with-postgres

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: infidao-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - infidao-network
    profiles:
      - with-nginx

  # Development environment
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: infidao-dev
    ports:
      - "3000:3000"
      - "9229:9229" # Debug port
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_PATH=/app/data/lancedb
      - BGE_MODEL_PATH=/app/models/bge-m3
      - REDIS_URL=redis://redis-dev:6379
      - DEBUG=infidao:*
      - HOT_RELOAD=true
    volumes:
      - ./:/app:ro
      - infidao_dev_data:/app/data
      - infidao_dev_models:/app/models
      - /app/node_modules
      - /app/.next
    depends_on:
      - redis-dev
    restart: unless-stopped
    networks:
      - infidao-dev-network
    profiles:
      - development

  # Development Redis
  redis-dev:
    image: redis:7-alpine
    container_name: infidao-redis-dev
    ports:
      - "6380:6379"
    volumes:
      - infidao_dev_redis:/data
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - infidao-dev-network
    profiles:
      - development

# Volume definitions
volumes:
  infidao_data:
    driver: local
  infidao_models:
    driver: local
  infidao_logs:
    driver: local
  infidao_redis:
    driver: local
  infidao_postgres:
    driver: local
  infidao_dev_data:
    driver: local
  infidao_dev_models:
    driver: local
  infidao_dev_redis:
    driver: local

# Network definitions
networks:
  infidao-network:
    driver: bridge
  infidao-dev-network:
    driver: bridge